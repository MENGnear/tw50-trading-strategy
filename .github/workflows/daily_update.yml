# ==========================================================
# 🚀 雲端量化排程檔：版次 v02.3 
# ==========================================================
name: 台股50 量化回測引擎 (v02.3)

on:
  schedule:
    # 嚴格對齊台股盤後：台灣時間 15:00 = UTC 07:00 
    # 僅於週一至週五 (1-5) 執行，避開六日休市干擾
    - cron: '0 7 * * 1-5'
  workflow_dispatch: # 保留手動測試按鈕，方便隨時強制啟動

permissions:
  contents: write

jobs:
  run-strategy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 取得程式碼
        uses: actions/checkout@v4
        
      - name: 🐍 設定 Python 3.10 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: 📦 安裝核心運算套件
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy yfinance
          
      - name: 🧠 執行 v02.3 策略運算與 Telegram 推播
        env:
          # 授權 Python 開啟 GitHub 保險箱讀取推播金鑰
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py
        
      - name: 🗄️ 打包並上傳回測資料庫 (Artifact)
        uses: actions/upload-artifact@v4
        with:
          # 將打包下載的檔案加上版本號，方便未來管理
          name: tw50-database-v02.3
          path: tw50_strategy.db
          retention-days: 7
          
      - name: 🔄 將最新資料庫推回 GitHub (讓網頁更新)
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add tw50_strategy.db
          git commit -m "🤖 自動更新：每日回測資料庫" || echo "資料庫無變動"
          git push
