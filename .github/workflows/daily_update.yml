name: 每日更新與回測 (0050)

on:
  schedule:
    - cron: '0 10 * * *' # 每天台灣時間 18:00 (UTC 10:00) 自動執行
  workflow_dispatch: # 允許手動執行

jobs:
  run-strategy:
    runs-on: ubuntu-latest
    steps:
      - name: 取得程式碼
        uses: actions/checkout@v4
        
      - name: 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: 安裝必要套件
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy yfinance
          
      - name: 執行資料抓取與回測
        run: python main.py
        
      - name: 打包並上傳資料庫 (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: tw50-database
          path: tw50_strategy.db
          retention-days: 7
