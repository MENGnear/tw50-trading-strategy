# ==========================================================
# ⭐⭐⭐⭐⭐⭐⭐⭐⭐⭐
#  檔名：.github/workflows/daily_update.yml
#  版次：v02.6 (回測精確對齊與 DBA 強制升級版)
# ⭐⭐⭐⭐⭐⭐⭐⭐⭐⭐
#  新增與優化：
#  1. [權限A] 賦予 actions 機器人 contents: write 寫入權限。
#  2. [Git機制B] 增加自動 commit 與 push 步驟，讓最新的 .db 覆蓋回 GitHub。
#  3. [觸發C] 保留 workflow_dispatch 以便隨時手動喚醒測試。
# ==========================================================

name: 台股50 量化回測引擎 (v02.6)

on:
  schedule:
    # 台灣時間 15:00 = UTC 07:00 (避開六日休市)
    - cron: '0 7 * * 1-5'
  workflow_dispatch: 
    inputs: # 💡 新增手動輸入選單
      force_reset:
        description: '⚠️ 強制清空舊資料並重抓 5 年歷史資料'
        required: true
        type: boolean
        default: false

# 【關鍵修復】賦予寫入權限，否則無法將資料庫推回 GitHub
permissions:
  contents: write

jobs:
  run-strategy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 取得程式碼
        uses: actions/checkout@v4
        
      - name: 🐍 設定 Python 3.10 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: 📦 安裝核心運算套件
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy yfinance
          
      - name: 🧠 執行 v02.6 策略運算與 Telegram 推播
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FORCE_RESET: ${{ inputs.force_reset }} # 💡 將開關狀態傳給 Python
        run: python main.py

      # 【關鍵修復】將算好的資料庫與 CSV 自動 Push 回 GitHub 儲存庫
      - name: 🔄 將最新資料與資料庫推回 GitHub (同步更新網頁端)
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add tw50_strategy.db temp_data.csv
          # 如果沒有變動就不會 commit 報錯
          git commit -m "🤖 自動更新：每日回測資料庫與 CSV (v02.12)" || echo "資料庫無變動"
          git push

      - name: 🗄️ 打包備份回測資料庫 (供手動下載查驗)
        uses: actions/upload-artifact@v4
        with:
          name: tw50-database-v02.12
          path: |
            tw50_strategy.db
            temp_data.csv
          retention-days: 7
